<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Chance Jump！ - Rhythm Game</title>
    <style>
        body {
            margin: 0;
            background-color: #0d0d11;
            color: white;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-y: auto;
            position: relative;
        }
        #bgImage {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 1280px;
            height: 768px;
            transform: translate(-50%, -50%);
            object-fit: cover;
            opacity: 0.25;
            z-index: -1;
            pointer-events: none;
        }
        #songTitle {
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 8px;
            letter-spacing: 2px;
            background: linear-gradient(45deg, #ff007f, #fff700, #7fff00, #00ffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }
        #gameContainer {
            position: relative;
        }
        #gameCanvas {
            background: linear-gradient(to bottom, rgba(0,0,5,0.85) 0%, rgba(10,10,20,0.85) 70%, rgba(21,21,37,0.85) 100%);
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.1);
        }
        /* ★画面上に大きく表示されるコンボカウント用スタイル */
        #comboOverlay {
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: 900;
            font-style: italic;
            color: #ffffff;
            text-shadow: 0 0 15px #00ffff, 0 0 30px #00ffff;
            pointer-events: none;
            opacity: 0;
            transition: transform 0.05s ease-out;
        }
        #info {
            margin-top: 12px;
            text-align: center;
            line-height: 1.6;
            font-size: 15px;
            font-weight: bold;
            background: rgba(20, 20, 30, 0.85);
            padding: 12px 25px;
            border-radius: 8px;
            border: 1px solid #222233;
        }
        .key-box {
            display: inline-block;
            width: 24px;
            text-align: center;
            background: #252535;
            border: 1px solid #555;
            border-radius: 4px;
            color: #fff;
            padding: 1px 4px;
            margin-right: 8px;
            font-family: monospace;
        }
        .start-ui { color: #00ffff; text-shadow: 0 0 8px #00ffff; }
        .pink-ui { color: #ff007f; text-shadow: 0 0 8px #ff007f; }
        .lemon-ui { color: #fff700; text-shadow: 0 0 8px #fff700; }
        .lime-ui { color: #7fff00; text-shadow: 0 0 8px #7fff00; }
        .cyan-ui { color: #00ffff; text-shadow: 0 0 8px #00ffff; }
        .reset-ui { color: #ff4757; text-shadow: 0 0 8px #ff4757; }
        
        #statusDisplay {
            font-size: 13px;
            color: #888899;
            margin-top: 8px;
            font-weight: normal;
        }
        #scoreDisplay {
            font-size: 18px;
            color: #ffffff;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

<table><tr><td>

    <img id="bgImage" src="1970103422569517337-1.png" alt="">

    <div id="songTitle">One Chance Jump！ by suno AI</div>

    <div id="gameContainer">
        <canvas id="gameCanvas" width="550" height="550"></canvas>
        <div id="comboOverlay">0 COMBO</div>
    </div>
    
    <div id="info">
        <div id="scoreDisplay">Score: 0</div>
        <div><span class="key-box">Z</span><span class="start-ui">ゲームスタート</span></div>
        <div><span class="key-box">X</span><span class="pink-ui">左レーン （ 蛍光ピンク ）</span></div>
        <div><span class="key-box">C</span><span class="lemon-ui">真中左レーン （ 蛍光レモン ）</span></div>
        <div style="height: 5px;"></div>
        <div><span class="key-box">B</span><span class="lime-ui">右レーン （ 蛍光黄緑 ）</span></div>
        <div><span class="key-box">N</span><span class="cyan-ui">真中右レーン （ 蛍光水 ）</span></div>
        <div style="height: 5px;"></div>
        <div><span class="key-box">R</span><span class="reset-ui">リセット</span></div>
        <div id="statusDisplay">音楽ファイルを読み込み中...</div>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreDisplay = document.getElementById('scoreDisplay');
const comboOverlay = document.getElementById('comboOverlay');
const statusDisplay = document.getElementById('statusDisplay');

// ★新しい曲名に変更
const AUDIO_URL = 'OneChanceJumpbysunoAI.mp3';

// 4レーン設定
const LANES_COUNT = 4;
const JUDGE_LINE_Y = 470; 

// ★【めちゃくちゃ遅く】速度をさらに低下（2.3 ? 1.8）
const NOTE_SPEED = 1.8;     

// ★【相当思い切り広く】判定幅を驚異の120ピクセルに拡大（ほぼ確実にHITします）
const HIT_RANGE = 120;     

// 4色蛍光カラー（ピンク、レモン、黄緑、水色）
const LANE_COLORS = [
    { base: '#ff007f', glow: 'rgba(255, 0, 127, 0.8)' },  // 蛍光ピンク
    { base: '#fff700', glow: 'rgba(255, 247, 0, 0.8)' },  // 蛍光レモン
    { base: '#7fff00', glow: 'rgba(127, 255, 0, 0.8)' },  // 蛍光黄緑
    { base: '#00ffff', glow: 'rgba(0, 255, 255, 0.8)' }   // 蛍光水色
];

let audioCtx = null;
let audioBuffer = null;
let audioSource = null;
let analyser = null;
let freqData = null;

let isPlaying = false;
let score = 0;
let combo = 0;
let notes = [];      
let particles = [];  
let hitEffects = []; 

// 長押し（ロングノーツ）判定用キー押しっぱなしフラグ
let keysPressed = [false, false, false, false];

// リズム解析用
let lastNoteTime = 0;

// キーマップ（指定：X, C, B, N）
const KEYS = {
    'z': 'start', 'Z': 'start', 'つ': 'start', 'っ': 'start',
    'r': 'reset', 'R': 'reset', 'す': 'reset',
    'x': 0, 'X': 0, 'さ': 0,
    'c': 1, 'C': 1, 'そ': 1,
    'b': 2, 'B': 2, 'こ': 2,
    'n': 3, 'N': 3, 'み': 3
};

const VANISH_X = canvas.width / 2;
const VANISH_Y = 80; 

async function loadAudio() {
    try {
        const response = await fetch(AUDIO_URL);
        if (!response.ok) throw new Error();
        audioBuffer = await response.arrayBuffer();
        statusDisplay.textContent = "【ロード完了】画面を1回クリックしたあと【Z】キーでスタート！";
        statusDisplay.style.color = "#00ffcc";
    } catch (e) {
        statusDisplay.textContent = "曲（OneChanceJumpbysunoAI.mp3）が見つかりません。";
        statusDisplay.style.color = "#ff4757";
    }
}

async function startGame() {
    if (isPlaying) return;
    if (!audioBuffer) return;

    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    statusDisplay.textContent = "楽曲解析中...";
    try {
        const decodedBuffer = await audioCtx.decodeAudioData(audioBuffer.slice(0));
        audioSource = audioCtx.createBufferSource();
        audioSource.buffer = decodedBuffer;
        
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 128; // 高解像度解析
        
        audioSource.connect(analyser);
        analyser.connect(audioCtx.destination);
        freqData = new Uint8Array(analyser.frequencyBinCount);

        notes = [];
        particles = [];
        hitEffects = [];
        score = 0;
        combo = 0;
        keysPressed = [false, false, false, false];
        updateUI();

        audioSource.start(0);
        isPlaying = true;
        statusDisplay.textContent = "演奏中 ?? 楽しんでね！";
        statusDisplay.style.color = "#fff700";

        audioSource.onended = () => {
            statusDisplay.textContent = "終了しました！【R】キーでリセットできます。";
            statusDisplay.style.color = "#00ffff";
            isPlaying = false;
        };

        requestAnimationFrame(gameLoop);
    } catch (error) {
        statusDisplay.textContent = "デコードエラーが発生しました。";
    }
}

function resetGame() {
    if (audioSource) { try { audioSource.stop(); } catch(e){} }
    notes = [];
    particles = [];
    hitEffects = [];
    score = 0;
    combo = 0;
    keysPressed = [false, false, false, false];
    isPlaying = false;
    updateUI();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    statusDisplay.textContent = "リセットしました。【Z】キーでいつでもスタート！";
    statusDisplay.style.color = "#00ffff";
}

function getPerspectivePos(lane, y) {
    const progress = y / canvas.height;
    const startWidth = 60;  
    const endWidth = 460;   
    const currentWidth = startWidth + (endWidth - startWidth) * progress;
    
    // 4レーン用に等分割
    const laneSpacing = currentWidth / 4;
    const screenX = VANISH_X + (lane - 1.5) * laneSpacing;
    const screenY = VANISH_Y + (canvas.height - VANISH_Y) * progress;
    const size = 5 + 25 * progress; 
    
    return { x: screenX, y: screenY, size: size };
}

// 4分、8分、16分、24分のリズムに合わせてノーツ（通常・同時・長押し）を自動生成
function analyzeAudio() {
    if (!analyser) return;
    analyser.getByteFrequencyData(freqData);

    // シンセ・ボーカル・ベースの中高音域のエネルギーを総合抽出
    const energy = (freqData[2] + freqData[4] + freqData[6] + freqData[8]) / 4;
    const currentTime = performance.now();

    // 曲調の強弱に合わせて生成間隔（4分音符?24分音符相当）をランダム変化させる
    const intervals = [720, 360, 180, 120]; 
    const randomInterval = intervals[Math.floor(Math.random() * intervals.length)];

    if (energy > 185 && (currentTime - lastNoteTime) > randomInterval) {
        const randType = Math.random();
        
        if (randType < 0.15) { 
            // 1) 2レーン同時押しノーツ
            let lane1 = Math.floor(Math.random() * LANES_COUNT);
            let lane2 = (lane1 + 1) % LANES_COUNT;
            notes.push({ lane: lane1, y: 0, type: 'normal', hit: false });
            notes.push({ lane: lane2, y: 0, type: 'normal', hit: false });
        } else if (randType < 0.35) { 
            // 2) 長押し（ロングノーツ）生成 (長さ160px分)
            let lane = Math.floor(Math.random() * LANES_COUNT);
            notes.push({ lane: lane, y: 0, type: 'long', length: 160, hit: false, holdProgress: 0, headHit: false });
        } else {
            // 3) 通常ノーツ生成
            let lane = Math.floor(Math.random() * LANES_COUNT);
            notes.push({ lane: lane, y: 0, type: 'normal', hit: false });
        }
        
        lastNoteTime = currentTime;
    }
}

function createExplosion(lane, customY = JUDGE_LINE_Y) {
    const pos = getPerspectivePos(lane, customY);
    const color = LANE_COLORS[lane].base;
    
    for (let i = 0; i < 15; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 5 + 2;
        particles.push({
            x: pos.x, y: pos.y,
            vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
            radius: Math.random() * 3 + 2.5, alpha: 1, color: color
        });
    }
    
    // 重複を避けて文字エフェクト生成
    if (customY === JUDGE_LINE_Y) {
        hitEffects.push({ x: pos.x, y: pos.y - 45, alpha: 1, color: color });
    }
}

function gameLoop() {
    if (!isPlaying) return;

    analyzeAudio();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    drawBackground();

    // ノーツの更新・描画
    for (let i = notes.length - 1; i >= 0; i--) {
        let note = notes[i];
        note.y += NOTE_SPEED;

        if (note.type === 'normal') {
            // 通常ノーツの描画
            if (!note.hit) {
                const pos = getPerspectivePos(note.lane, note.y);
                drawNeonCircle(pos.x, pos.y, pos.size, LANE_COLORS[note.lane].base);
            }
            if (note.y > canvas.height && !note.hit) {
                notes.splice(i, 1);
                breakCombo();
            }
        } 
        else if (note.type === 'long') {
            // ロングノーツの描画と処理
            const headY = note.y;
            const tailY = note.y - note.length;

            const headPos = getPerspectivePos(note.lane, headY);
            const tailPos = getPerspectivePos(note.lane, Math.max(0, tailY));

            if (tailY < canvas.height && note.holdProgress < 1) {
                // 帯（レーザー）の描画
                ctx.save();
                ctx.strokeStyle = LANE_COLORS[note.lane].base;
                ctx.lineWidth = headPos.size * 1.5;
                ctx.globalAlpha = 0.4;
                ctx.shadowBlur = 10;
                ctx.shadowColor = LANE_COLORS[note.lane].base;
                ctx.beginPath();
                ctx.moveTo(tailPos.x, tailPos.y);
                ctx.lineTo(headPos.x, headPos.y);
                ctx.stroke();
                ctx.restore();

                // 始点と終点のノーツ
                if (!note.headHit) drawNeonCircle(headPos.x, headPos.y, headPos.size, '#ffffff');
                drawNeonCircle(tailPos.x, tailPos.y, tailPos.size, LANE_COLORS[note.lane].base);
            }

            // 長押し中のリアルタイムコンボ加算
            if (note.headHit && keysPressed[note.lane] && headY >= JUDGE_LINE_Y && tailY <= JUDGE_LINE_Y) {
                if (Math.random() < 0.1) { // 押しっぱなし中、確率でスパーク
                    createExplosion(note.lane, JUDGE_LINE_Y);
                    score += 10;
                    combo++;
                    updateUI();
                }
            }

            // 終点が判定線を完全に通り過ぎたら消去
            if (tailY > canvas.height) {
                if (!note.headHit) breakCombo();
                notes.splice(i, 1);
            }
        }
    }

    // パーティクルアニメ
    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx; p.y += p.vy; p.alpha -= 0.04;
        if (p.alpha <= 0) { particles.splice(i, 1); continue; }
        ctx.save();
        ctx.globalAlpha = p.alpha;
        ctx.shadowBlur = 8; ctx.shadowColor = p.color;
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
    }

    // HIT!文字アニメ
    for (let i = hitEffects.length - 1; i >= 0; i--) {
        let h = hitEffects[i];
        h.y -= 0.5; h.alpha -= 0.03;
        if (h.alpha <= 0) { hitEffects.splice(i, 1); continue; }
        ctx.save();
        ctx.globalAlpha = h.alpha;
        ctx.font = "italic bold 32px sans-serif";
        ctx.fillStyle = "#ffffff";
        ctx.shadowBlur = 12; ctx.shadowColor = h.color;
        ctx.textAlign = "center";
        ctx.fillText("HIT!", h.x, h.y);
        ctx.restore();
    }

    requestAnimationFrame(gameLoop);
}

function drawNeonCircle(x, y, size, color) {
    ctx.shadowBlur = 15;
    ctx.shadowColor = color;
    let grad = ctx.createRadialGradient(x, y, 0, x, y, size);
    grad.addColorStop(0, '#ffffff');
    grad.addColorStop(0.4, color);
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.beginPath(); ctx.arc(x, y, size, 0, Math.PI * 2);
    ctx.fillStyle = grad; ctx.fill();
    ctx.shadowBlur = 0;
}

function drawBackground() {
    const leftEdge = getPerspectivePos(0, JUDGE_LINE_Y);
    const rightEdge = getPerspectivePos(3, JUDGE_LINE_Y);
    
    // 極太判定線
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.85)';
    ctx.lineWidth = 10;
    ctx.shadowBlur = 20;
    ctx.shadowColor = '#00ffff';
    ctx.beginPath();
    ctx.moveTo(leftEdge.x - 30, leftEdge.y);
    ctx.lineTo(rightEdge.x + 30, rightEdge.y);
    ctx.stroke();
    ctx.shadowBlur = 0;

    // 4レーンの枠線
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.08)';
    ctx.lineWidth = 2;
    for (let i = 0; i <= LANES_COUNT; i++) {
        const topPos = getPerspectivePos(i - 0.5, 0);
        const bottomPos = getPerspectivePos(i - 0.5, canvas.height);
        ctx.beginPath();
        ctx.moveTo(topPos.x, topPos.y);
        ctx.lineTo(bottomPos.x, bottomPos.y);
        ctx.stroke();
    }
}

// 判定処理
function judgeKey(lane) {
    if (!isPlaying) return;

    let targetNote = null;
    let minDiff = Infinity;

    for (let note of notes) {
        if (note.lane === lane) {
            let diff = Math.abs(note.y - JUDGE_LINE_Y);
            if (diff < minDiff) {
                if (note.type === 'normal' && !note.hit) {
                    minDiff = diff;
                    targetNote = note;
                } else if (note.type === 'long' && !note.headHit) {
                    minDiff = diff;
                    targetNote = note;
                }
            }
        }
    }

    if (targetNote && minDiff < HIT_RANGE) {
        if (targetNote.type === 'normal') {
            targetNote.hit = true;
            score += 100 + combo * 2;
            combo++;
            createExplosion(lane, JUDGE_LINE_Y);
        } else if (targetNote.type === 'long') {
            targetNote.headHit = true;
            score += 50;
            combo++;
            createExplosion(lane, JUDGE_LINE_Y);
        }
        updateUI();
        triggerComboAnimation();
    }
}

function breakCombo() {
    combo = 0;
    updateUI();
}

function updateUI() {
    scoreDisplay.textContent = `Score: ${score}`;
    if (combo > 0) {
        comboOverlay.textContent = `${combo} COMBO`;
        comboOverlay.style.opacity = "1";
    } else {
        comboOverlay.style.opacity = "0";
    }
}

// コンボ上昇時に画面中央の文字をピクッと跳ねさせるアニメーション
function triggerComboAnimation() {
    comboOverlay.style.transform = "translate(-50%, -50%) scale(1.2)";
    setTimeout(() => {
        comboOverlay.style.transform = "translate(-50%, -50%) scale(1.0)";
    }, 50);
}

window.addEventListener('keydown', (e) => {
    const action = KEYS[e.key];
    if (action === undefined) return;

    if (action === 'start') {
        startGame();
    } else if (action === 'reset') {
        resetGame();
    } else if (typeof action === 'number') {
        keysPressed[action] = true;
        judgeKey(action);
    }
});

window.addEventListener('keyup', (e) => {
    const action = KEYS[e.key];
    if (typeof action === 'number') {
        keysPressed[action] = false;
    }
});

loadAudio();
</script>
